<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect x="4" y="4" width="56" height="56" rx="12" fill="url(#bg)"/>
  
  <!-- Grid of buttons -->
  <g fill="white">
    <!-- Row 1 -->
    <rect x="10" y="14" width="12" height="12" rx="2"/>
    <rect x="26" y="14" width="12" height="12" rx="2"/>
    <rect x="42" y="14" width="12" height="12" rx="2"/>
    
    <!-- Row 2 -->
    <rect x="10" y="34" width="12" height="12" rx="2"/>
    <rect x="26" y="34" width="12" height="12" rx="2"/>
    <rect x="42" y="34" width="12" height="12" rx="2"/>
  </g>
  
  <!-- USB connector symbol -->
  <g fill="white">
    <circle cx="32" cy="54" r="3"/>
    <rect x="29" y="48" width="6" height="4" rx="1"/>
  </g>
</svg>
